definition_version: '2'
entities:
  Advocacy_Monthly_Roster:
    type: streamlit
    identifier:
      database: STREAMLIT_APPS
      schema: ADVOCACY_MONTHLY_ROSTER
      name: Advocacy_Monthly_Roster
    title: "Advocacy Monthly Roster"
    main_file: streamlit_app.py
    query_warehouse: PUBLIC_ZENDESK_L
    compute_pool: SYSTEM_COMPUTE_POOL_CPU
    runtime_name: SYSTEM$ST_CONTAINER_RUNTIME_PY3_11
    stage: production
    artifacts:
      # .streamlit/config.toml ONLY — never the whole dir, or secrets.toml
      # (gitignored but present locally) would ship into the deployed app.
      # pyproject.toml intentionally excluded: SiS tries to install its deps
      # from PyPI, which fails without EAI. All needed packages are pre-installed
      # in the container runtime from the Snowflake Anaconda channel.
      - .streamlit/config.toml
      - environment.yml
      - streamlit_app.py
      - core/
      - services/
      - ui/
